services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caerus_gardener -d caerus_gardener"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "100.101.206.14:8788:8000"
volumes:
  postgres_data:
